<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4F46E5">
    <title>FamilieHub – Din families digitale hjem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #A5B4FC;
            --primary-dark: #3730A3;
            --secondary: #EC4899;
            --accent: #F59E0B;
            --success: #10B981;
            --teal: #14B8A6;
            --sky: #0EA5E9;
            --danger: #EF4444;
            --warning: #F59E0B;
            --bg: #F6F8FC;
            --bg-soft: #EEF2F7;
            --card: #FFFFFF;
            --text: #0F172A;
            --text-muted: #64748B;
            --text-soft: #94A3B8;
            --border: #E2E8F0;
            --ring: rgba(79, 70, 229, 0.16);
            --shadow-xs: 0 1px 2px rgba(15, 23, 42, 0.04);
            --shadow: 0 8px 30px rgba(15, 23, 42, 0.07);
            --shadow-lg: 0 22px 60px rgba(15, 23, 42, 0.12);
            --radius-md: 14px;
            --radius-lg: 18px;
            --radius-xl: 24px;
            --gradient-primary: linear-gradient(135deg, #4F46E5 0%, #7C3AED 52%, #EC4899 100%);
            --gradient-cool: linear-gradient(135deg, #0EA5E9 0%, #14B8A6 100%);
            --gradient-warm: linear-gradient(135deg, #F59E0B 0%, #EF4444 100%);
            --gradient-mint: linear-gradient(135deg, #10B981 0%, #06B6D4 100%);
            --gradient-aurora: linear-gradient(135deg, #6366F1 0%, #8B5CF6 38%, #EC4899 72%, #F97316 100%);
        }

        * { box-sizing: border-box; }

        html {
            min-height: 100%;
            background: var(--bg);
            -webkit-text-size-adjust: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text);
            font-family: 'Inter', 'Plus Jakarta Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: geometricPrecision;
            background:
                radial-gradient(circle at 8% -10%, rgba(79, 70, 229, 0.13) 0%, transparent 32%),
                radial-gradient(circle at 100% 4%, rgba(236, 72, 153, 0.08) 0%, transparent 30%),
                linear-gradient(180deg, #F8FAFC 0%, #F6F8FC 42%, #EEF2F7 100%);
        }

        #root { min-height: 100vh; }

        h1, h2, h3, h4 {
            font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
            font-weight: 800;
            letter-spacing: -0.035em;
            color: var(--text);
        }

        p { line-height: 1.55; }

        button, input, textarea, select {
            font-family: inherit;
        }

        button {
            -webkit-tap-highlight-color: transparent;
        }

        button:focus-visible,
        input:focus-visible,
        textarea:focus-visible,
        select:focus-visible {
            outline: 3px solid var(--ring);
            outline-offset: 2px;
        }

        /* Global app shell */
        .app-sidebar {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(22px);
            border-right: 1px solid rgba(226, 232, 240, 0.85);
            box-shadow: 8px 0 34px rgba(15, 23, 42, 0.045);
        }

        main {
            background: transparent;
        }

        /* Cards */
        .card,
        .card-vivid,
        .stat-card,
        .modal-card {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(226, 232, 240, 0.86);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
        }

        .card,
        .card-vivid,
        .stat-card {
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }

        .card:hover,
        .card-vivid:hover,
        .stat-card:hover {
            border-color: rgba(99, 102, 241, 0.26);
            box-shadow: var(--shadow-lg);
            transform: translateY(-1px);
        }

        .card-vivid {
            position: relative;
            overflow: hidden;
        }

        .card-vivid::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gradient-aurora);
            opacity: 0.045;
            pointer-events: none;
        }

        .card-vivid > * { position: relative; z-index: 1; }

        /* Sections */
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
            font-size: 18px;
            font-weight: 850;
            line-height: 1.15;
            color: var(--text);
            letter-spacing: -0.025em;
        }

        .section-subtitle {
            margin-top: 5px;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Navigation */
        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            min-height: 46px;
            margin-bottom: 4px;
            padding: 12px 14px;
            border: 0;
            border-radius: 16px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            text-align: left;
            text-decoration: none;
            transition: background 0.16s ease, color 0.16s ease, transform 0.16s ease;
        }

        .nav-item:hover {
            background: rgba(241, 245, 249, 0.95);
            color: var(--text);
            transform: translateX(1px);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.12), rgba(236, 72, 153, 0.08));
            color: var(--primary-dark);
            box-shadow: inset 0 0 0 1px rgba(79, 70, 229, 0.10);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: -16px;
            top: 50%;
            width: 4px;
            height: 64%;
            transform: translateY(-50%);
            border-radius: 999px;
            background: var(--gradient-primary);
        }

        .nav-item svg { color: currentColor; }

        /* Buttons */
        .btn-primary,
        .btn-gradient {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
            border: 0;
            border-radius: 14px;
            background: var(--gradient-primary);
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 800;
            padding: 11px 20px;
            box-shadow: 0 10px 26px rgba(79, 70, 229, 0.28);
            transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
        }

        .btn-primary:hover,
        .btn-gradient:hover {
            transform: translateY(-1px);
            box-shadow: 0 15px 36px rgba(79, 70, 229, 0.36);
            filter: saturate(1.05);
        }

        .btn-secondary,
        .btn-danger {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 44px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 800;
            padding: 11px 18px;
            transition: background 0.16s ease, color 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
        }

        .btn-secondary {
            background: #F8FAFC;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #EEF2F7;
            border-color: #CBD5E1;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: #FEF2F2;
            color: #B91C1C;
            border: 1px solid #FECACA;
        }

        .btn-danger:hover {
            background: #EF4444;
            border-color: #EF4444;
            color: white;
        }

        .btn-primary:disabled,
        .btn-gradient:disabled,
        .btn-secondary:disabled,
        .btn-danger:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Forms */
        .input-field,
        input[type='text'],
        input[type='email'],
        input[type='password'],
        input[type='number'],
        input[type='date'],
        input[type='time'],
        textarea,
        select {
            width: 100%;
            min-height: 44px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            background: #FFFFFF;
            color: var(--text);
            font-size: 14px;
            padding: 11px 14px;
            outline: none;
            box-shadow: var(--shadow-xs);
            transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        .input-field:focus,
        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--primary);
            background: #FFFFFF;
            box-shadow: 0 0 0 4px var(--ring);
        }

        .input-field::placeholder,
        input::placeholder,
        textarea::placeholder {
            color: var(--text-soft);
        }

        label span {
            color: #334155;
        }

        /* Badges and chips */
        .badge,
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            line-height: 1;
            white-space: nowrap;
        }

        .badge {
            padding: 5px 11px;
        }

        .chip {
            padding: 6px 12px;
            text-transform: uppercase;
            letter-spacing: 0.055em;
        }

        .badge-primary,
        .chip-primary { background: #EEF2FF; color: #3730A3; border: 1px solid #C7D2FE; }
        .badge-success,
        .chip-success { background: #D1FAE5; color: #065F46; border: 1px solid #A7F3D0; }
        .badge-warning,
        .chip-warning { background: #FEF3C7; color: #92400E; border: 1px solid #FDE68A; }
        .badge-danger,
        .chip-danger { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
        .chip-info { background: #E0F2FE; color: #075985; border: 1px solid #BAE6FD; }
        .chip-rose { background: #FCE7F3; color: #9D174D; border: 1px solid #FBCFE8; }

        /* Stats */
        .stat-card {
            padding: 22px;
        }

        .stat-card .stat-icon,
        .stat-icon-soft {
            width: 46px;
            height: 46px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .stat-card .stat-value {
            margin: 0 0 4px;
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
        }

        .stat-card .stat-label {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.055em;
            text-transform: uppercase;
        }

        .stat-icon-soft.primary { background: #EEF2FF; color: #3730A3; }
        .stat-icon-soft.success { background: #D1FAE5; color: #047857; }
        .stat-icon-soft.warning { background: #FEF3C7; color: #B45309; }
        .stat-icon-soft.danger { background: #FEE2E2; color: #B91C1C; }
        .stat-icon-soft.info { background: #E0F2FE; color: #0369A1; }
        .stat-icon-soft.rose { background: #FCE7F3; color: #BE185D; }

        /* Hero */
        .hero-gradient {
            position: relative;
            overflow: hidden;
            border-radius: 28px;
            background: var(--gradient-aurora);
            color: white;
            box-shadow: 0 22px 58px rgba(79, 70, 229, 0.28);
        }

        .hero-gradient h1,
        .hero-gradient h2,
        .hero-gradient h3,
        .hero-gradient p { color: inherit; }

        .hero-gradient::before,
        .hero-gradient::after {
            content: '';
            position: absolute;
            border-radius: 999px;
            filter: blur(68px);
            pointer-events: none;
        }

        .hero-gradient::before {
            top: -110px;
            right: -80px;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.18);
        }

        .hero-gradient::after {
            bottom: -140px;
            left: -90px;
            width: 350px;
            height: 350px;
            background: rgba(14, 165, 233, 0.22);
        }

        .hero-gradient > * { position: relative; z-index: 1; }

        .gradient-primary { background: var(--gradient-primary); }
        .gradient-warm { background: var(--gradient-warm); }
        .gradient-success { background: var(--gradient-mint); }
        .gradient-bg { background: linear-gradient(160deg, #EEF2FF 0%, #F0FDF4 50%, #FFFBEB 100%); }

        /* Progress */
        .progress-bar {
            height: 8px;
            overflow: hidden;
            border-radius: 999px;
            background: #E2E8F0;
        }

        .progress-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 0.45s ease;
        }

        /* Avatar */
        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 999px;
            border: 2px solid white;
            background: var(--gradient-primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 900;
            overflow: hidden;
            box-shadow: 0 5px 16px rgba(15, 23, 42, 0.14);
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state-icon {
            width: 72px;
            height: 72px;
            border-radius: 24px;
            background: var(--bg-soft);
            color: var(--text-muted);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-state svg { opacity: 0.28; margin-bottom: 16px; }
        .empty-state p { margin: 0; font-size: 14px; }

        /* Tables and charts */
        table { border-collapse: separate; border-spacing: 0; }
        th { color: #475569; font-weight: 800; }
        td { color: #0F172A; }

        .recharts-text { fill: #64748B !important; }
        .recharts-cartesian-grid line { stroke: #EEF2F7 !important; }
        .recharts-tooltip-wrapper .recharts-default-tooltip {
            background: rgba(255,255,255,0.97) !important;
            border: 1px solid #E2E8F0 !important;
            border-radius: 14px !important;
            box-shadow: var(--shadow) !important;
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            gap: 4px;
            padding: 4px;
            border-radius: 14px;
            background: #EEF2F7;
        }

        .tab-item {
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 42px;
            border: 0;
            border-radius: 11px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            font-weight: 800;
            padding: 9px 16px;
            transition: all 0.16s ease;
        }

        .tab-item.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
        }

        /* Mobile bottom nav */
        .bottom-nav {
            position: fixed;
            right: 12px;
            bottom: 12px;
            left: 12px;
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 7px 7px calc(env(safe-area-inset-bottom, 0px) + 7px);
            border: 1px solid rgba(226, 232, 240, 0.72);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(24px);
            box-shadow: 0 18px 48px rgba(15, 23, 42, 0.16);
        }

        .bottom-nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            min-height: 54px;
            border: 0;
            border-radius: 17px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 10px;
            font-weight: 850;
            padding: 8px 2px;
            transition: all 0.16s ease;
        }

        .bottom-nav-item.active {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 8px 18px rgba(79, 70, 229, 0.34);
        }

        .bottom-nav-item svg { width: 22px; height: 22px; }

        /* Misc */
        .modal-overlay { background: rgba(15, 23, 42, 0.56); backdrop-filter: blur(10px); }
        .divider { height: 1px; margin: 0; background: var(--border); }
        .status-dot { width: 8px; height: 8px; border-radius: 999px; }
        .status-dot.green { background: #10B981; box-shadow: 0 0 8px rgba(16,185,129,.65); }
        .status-dot.yellow { background: #F59E0B; box-shadow: 0 0 8px rgba(245,158,11,.65); }
        .status-dot.red { background: #EF4444; box-shadow: 0 0 8px rgba(239,68,68,.65); }
        .glass-panel { background: #172033; border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; color: #E2E8F0; box-shadow: 0 16px 50px rgba(0,0,0,.28); }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.62; } }
        @keyframes spin { to { transform: rotate(360deg); } }

        .animate-fade-in { animation: fadeIn 0.36s ease forwards; }
        .animate-slide-in { animation: slideIn 0.28s ease forwards; }
        .animate-pulse-soft { animation: pulse-soft 2s ease infinite; }
        .spinner { width: 20px; height: 20px; border: 2px solid #E2E8F0; border-top-color: var(--primary); border-radius: 999px; animation: spin 0.75s linear infinite; }

        @media (max-width: 768px) {
            body { padding-bottom: 78px; }
            main { padding-bottom: 96px !important; }
            .card,
            .card-vivid,
            .stat-card { border-radius: 20px; }
            .input-field,
            input,
            textarea,
            select { min-height: 48px; font-size: 16px; padding: 13px 14px; }
            .btn-primary,
            .btn-gradient,
            .btn-secondary,
            .btn-danger { min-height: 48px; font-size: 15px; padding: 12px 18px; }
            .tab-item { min-height: 46px; font-size: 14px; padding: 10px 14px; }
            .nav-item { min-height: 50px; padding: 14px 16px; font-size: 15px; }
            .section-title { font-size: 17px; }
            .hero-gradient { border-radius: 22px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
<script type="importmap">
{

    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",

  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
