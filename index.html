<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2563EB">
  <title>FamilieHub – Din families digitale hjem</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-dark: #1D4ED8;
      --primary-soft: #EFF6FF;
      --success: #059669;
      --success-soft: #ECFDF5;
      --warning: #D97706;
      --warning-soft: #FFFBEB;
      --danger: #DC2626;
      --danger-soft: #FEF2F2;
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --surface-muted: #F1F5F9;
      --text: #0F172A;
      --text-muted: #475569;
      --text-soft: #64748B;
      --border: #E2E8F0;
      --border-strong: #CBD5E1;
      --ring: rgba(37, 99, 235, 0.16);
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.05);
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --shadow-lg: 0 18px 48px rgba(15, 23, 42, 0.12);
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 18px;
      --radius-xl: 22px;
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background: var(--bg) !important;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    #root { min-height: 100vh; }

    h1, h2, h3, h4 {
      margin: 0;
      color: var(--text) !important;
      font-family: Inter, system-ui, sans-serif;
      font-weight: 850;
      letter-spacing: -0.035em;
      line-height: 1.12;
    }

    p { line-height: 1.55; }

    button, input, textarea, select { font-family: inherit; }
    button { -webkit-tap-highlight-color: transparent; }

    button:focus-visible,
    input:focus-visible,
    textarea:focus-visible,
    select:focus-visible {
      outline: 3px solid var(--ring);
      outline-offset: 2px;
    }

    /* Remove old gradient/cyber look globally */
    .gradient-primary,
    .gradient-warm,
    .gradient-success,
    .gradient-bg,
    .hero-gradient,
    main [style*="linear-gradient"],
    main [style*="radial-gradient"] {
      background: var(--surface) !important;
      color: var(--text) !important;
    }

    .hero-gradient::before,
    .hero-gradient::after,
    .card-vivid::before {
      display: none !important;
      content: none !important;
    }

    .hero-gradient {
      border: 1px solid var(--border) !important;
      border-radius: var(--radius-xl) !important;
      box-shadow: var(--shadow) !important;
    }

    main .text-white,
    main [class*="text-white"] {
      color: var(--text) !important;
    }

    main .text-slate-500,
    main .text-slate-600,
    main .text-slate-700,
    main .text-slate-800,
    main .text-slate-900 {
      color: inherit;
    }

    main [class*="bg-black"],
    main [class*="bg-white/"] {
      background: var(--surface) !important;
    }

    main [class*="border-white"],
    main [class*="border-black"] {
      border-color: var(--border) !important;
    }

    main [class*="shadow-["],
    main [style*="box-shadow"] {
      box-shadow: var(--shadow-sm) !important;
    }

    /* App shell */
    .app-sidebar {
      background: var(--surface) !important;
      border-right: 1px solid var(--border) !important;
      box-shadow: none !important;
    }

    header[style] {
      background: rgba(255, 255, 255, 0.94) !important;
      backdrop-filter: blur(18px) !important;
    }

    main {
      background: var(--bg) !important;
    }

    /* Cards */
    .card,
    .card-vivid,
    .glass-panel,
    .stat-card,
    .modal-card,
    main [class*="glass-panel"] {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius-xl) !important;
      box-shadow: var(--shadow-sm) !important;
      overflow: hidden;
    }

    .card,
    .card-vivid,
    .glass-panel,
    .stat-card {
      transition: border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
    }

    .card:hover,
    .card-vivid:hover,
    .glass-panel:hover,
    .stat-card:hover {
      border-color: var(--border-strong) !important;
      box-shadow: var(--shadow) !important;
      transform: translateY(-1px);
    }

    /* Typography */
    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      color: var(--text) !important;
      font-size: 18px;
      font-weight: 850;
      letter-spacing: -0.025em;
      line-height: 1.2;
    }

    .section-subtitle {
      margin-top: 6px;
      color: var(--text-muted) !important;
      font-size: 13px;
      line-height: 1.45;
    }

    main p,
    main span,
    main label,
    main div {
      text-shadow: none !important;
    }

    main .text-slate-300,
    main .text-slate-400,
    main .text-slate-500,
    main [class*="text-slate-3"],
    main [class*="text-slate-4"],
    main [class*="text-slate-5"] {
      color: var(--text-muted) !important;
    }

    main .text-yellow-400,
    main .text-cyan-400,
    main .text-magenta-400,
    main .text-orange-500,
    main .text-emerald-400,
    main .text-rose-400 {
      color: var(--primary) !important;
    }

    /* Navigation */
    .nav-item {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-height: 48px;
      margin-bottom: 4px;
      padding: 12px 14px;
      border: 1px solid transparent;
      border-radius: var(--radius-md);
      background: transparent !important;
      color: var(--text-muted) !important;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      text-align: left;
      text-decoration: none;
      transition: background 0.16s ease, color 0.16s ease, border-color 0.16s ease;
    }

    .nav-item:hover {
      background: var(--surface-muted) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
      transform: none !important;
    }

    .nav-item.active {
      background: var(--primary-soft) !important;
      color: var(--primary-dark) !important;
      border-color: #BFDBFE !important;
      box-shadow: none !important;
    }

    .nav-item.active::before {
      display: none !important;
      content: none !important;
    }

    .nav-item svg { color: currentColor; }

    /* Tabs */
    .tab-bar {
      display: flex;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface-muted) !important;
    }

    .tab-item,
    main button[class*="uppercase"] {
      min-height: 42px;
      border-radius: var(--radius-md);
      border-color: transparent !important;
      color: var(--text-muted) !important;
      font-weight: 800;
      letter-spacing: 0.02em;
      transition: background 0.16s ease, color 0.16s ease, border-color 0.16s ease;
    }

    .tab-item.active,
    main button[class*="border-b-2"],
    main button[class*="border-b border"] {
      background: var(--surface) !important;
      color: var(--primary-dark) !important;
      border: 1px solid var(--border-strong) !important;
      box-shadow: var(--shadow-sm) !important;
    }

    main button[class*="tracking-widest"] {
      letter-spacing: 0.06em !important;
    }

    /* Buttons */
    .btn-primary,
    .btn-gradient,
    .CyberButton,
    main button[class*="bg-indigo"],
    main button[class*="bg-yellow"],
    main button[class*="bg-amber"],
    main button[class*="bg-cyan"],
    main button[class*="bg-emerald"] {
      background: var(--primary) !important;
      color: #FFFFFF !important;
      border: 1px solid var(--primary) !important;
      border-radius: var(--radius-md) !important;
      box-shadow: none !important;
      font-weight: 800;
    }

    .btn-primary:hover,
    .btn-gradient:hover,
    main button[class*="bg-indigo"]:hover,
    main button[class*="bg-yellow"]:hover,
    main button[class*="bg-amber"]:hover,
    main button[class*="bg-cyan"]:hover,
    main button[class*="bg-emerald"]:hover {
      background: var(--primary-dark) !important;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn-secondary {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border-strong) !important;
      border-radius: var(--radius-md) !important;
      box-shadow: none !important;
      font-weight: 800;
    }

    .btn-secondary:hover {
      background: var(--surface-muted) !important;
      transform: none !important;
    }

    .btn-danger {
      background: var(--danger-soft) !important;
      color: var(--danger) !important;
      border: 1px solid #FECACA !important;
      border-radius: var(--radius-md) !important;
      font-weight: 800;
    }

    .btn-danger:hover {
      background: var(--danger) !important;
      color: #FFFFFF !important;
    }

    /* Forms */
    .input-field,
    input[type='text'],
    input[type='email'],
    input[type='password'],
    input[type='number'],
    input[type='date'],
    input[type='time'],
    textarea,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--border-strong) !important;
      border-radius: var(--radius-md) !important;
      background: var(--surface) !important;
      color: var(--text) !important;
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      box-shadow: none !important;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .input-field:focus,
    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 4px var(--ring) !important;
    }

    .input-field::placeholder,
    input::placeholder,
    textarea::placeholder {
      color: var(--text-soft) !important;
    }

    label span,
    main label {
      color: var(--text-muted) !important;
      font-weight: 700;
    }

    /* Badges/chips */
    .badge,
    .chip,
    main [class*="badge"] {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px !important;
      border: 1px solid var(--border) !important;
      background: var(--surface-muted) !important;
      color: var(--text-muted) !important;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
      padding: 6px 11px;
      text-transform: none !important;
      letter-spacing: 0 !important;
    }

    .badge-primary,
    .chip-primary { background: var(--primary-soft) !important; color: var(--primary-dark) !important; border-color: #BFDBFE !important; }
    .badge-success,
    .chip-success { background: var(--success-soft) !important; color: #047857 !important; border-color: #A7F3D0 !important; }
    .badge-warning,
    .chip-warning { background: var(--warning-soft) !important; color: #92400E !important; border-color: #FDE68A !important; }
    .badge-danger,
    .chip-danger { background: var(--danger-soft) !important; color: var(--danger) !important; border-color: #FECACA !important; }

    /* Stats */
    .stat-card {
      padding: 22px;
    }

    .stat-card .stat-icon,
    .stat-icon-soft {
      width: 46px;
      height: 46px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      background: var(--surface-muted) !important;
      color: var(--primary) !important;
    }

    .stat-card .stat-value {
      margin: 0 0 4px;
      color: var(--text) !important;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .stat-card .stat-label {
      color: var(--text-muted) !important;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.055em;
      text-transform: uppercase;
    }

    /* Tables/charts */
    table { border-collapse: separate; border-spacing: 0; }
    th { color: var(--text-muted) !important; font-weight: 800; }
    td { color: var(--text) !important; }

    .recharts-text { fill: var(--text-muted) !important; }
    .recharts-cartesian-grid line { stroke: #EEF2F7 !important; }
    .recharts-tooltip-wrapper .recharts-default-tooltip {
      background: #FFFFFF !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius-md) !important;
      box-shadow: var(--shadow) !important;
    }

    /* Progress */
    .progress-bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #E2E8F0 !important;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--primary) !important;
      transition: width 0.45s ease;
    }

    /* Empty states */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
      color: var(--text-muted) !important;
    }

    .empty-state-icon {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-xl);
      background: var(--surface-muted) !important;
      color: var(--text-muted) !important;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-state svg { opacity: 0.45; margin-bottom: 16px; }
    .empty-state p { margin: 0; font-size: 14px; color: var(--text-muted) !important; }

    /* Mobile bottom nav */
    .bottom-nav {
      position: fixed;
      right: 12px;
      bottom: 12px;
      left: 12px;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 7px 7px calc(env(safe-area-inset-bottom, 0px) + 7px);
      border: 1px solid var(--border) !important;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.96) !important;
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow-lg) !important;
    }

    .bottom-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      min-height: 54px;
      border: 1px solid transparent;
      border-radius: 17px;
      background: transparent !important;
      color: var(--text-muted) !important;
      cursor: pointer;
      font-size: 10px;
      font-weight: 850;
      padding: 8px 2px;
      transition: background 0.16s ease, color 0.16s ease;
    }

    .bottom-nav-item.active {
      background: var(--primary-soft) !important;
      color: var(--primary-dark) !important;
      border-color: #BFDBFE !important;
      box-shadow: none !important;
    }

    .bottom-nav-item svg { width: 22px; height: 22px; }

    /* Neutralize aggressive Tailwind color utilities inside old Business components */
    main [class*="border-l-yellow"],
    main [class*="border-l-orange"],
    main [class*="border-l-cyan"],
    main [class*="border-l-emerald"],
    main [class*="border-l-rose"] {
      border-left-color: var(--border-strong) !important;
    }

    main [class*="bg-yellow"],
    main [class*="bg-orange"],
    main [class*="bg-cyan"],
    main [class*="bg-emerald"],
    main [class*="bg-rose"],
    main [class*="bg-red"],
    main [class*="bg-fuchsia"],
    main [class*="bg-purple"] {
      background-color: var(--surface) !important;
    }

    main .border-2,
    main .border-dashed {
      border-color: var(--border) !important;
    }

    /* Keep clear semantic colors where needed */
    main .text-red-500,
    main .text-red-600,
    main .text-rose-500,
    main .text-rose-600 { color: var(--danger) !important; }
    main .text-emerald-500,
    main .text-emerald-600 { color: var(--success) !important; }
    main .text-amber-500,
    main .text-amber-600 { color: var(--warning) !important; }
    main .text-indigo-500,
    main .text-indigo-600,
    main .text-blue-500,
    main .text-blue-600 { color: var(--primary) !important; }

    .modal-overlay { background: rgba(15, 23, 42, 0.52); backdrop-filter: blur(10px); }
    .divider { height: 1px; margin: 0; background: var(--border); }
    .status-dot { width: 8px; height: 8px; border-radius: 999px; }
    .status-dot.green { background: var(--success); }
    .status-dot.yellow { background: var(--warning); }
    .status-dot.red { background: var(--danger); }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.72; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    .animate-fade-in { animation: fadeIn 0.26s ease forwards; }
    .animate-slide-in { animation: slideIn 0.22s ease forwards; }
    .animate-pulse-soft { animation: pulse-soft 2s ease infinite; }
    .spinner { width: 20px; height: 20px; border: 2px solid #E2E8F0; border-top-color: var(--primary); border-radius: 999px; animation: spin 0.75s linear infinite; }

    @media (max-width: 768px) {
      body { padding-bottom: 78px; }
      main { padding: 18px !important; padding-bottom: 96px !important; }
      .card, .card-vivid, .glass-panel, .stat-card { border-radius: 18px !important; }
      .input-field, input, textarea, select { min-height: 48px; font-size: 16px; padding: 13px 14px; }
      .btn-primary, .btn-gradient, .btn-secondary, .btn-danger { min-height: 48px; font-size: 15px; padding: 12px 18px; }
      .tab-item { min-height: 46px; font-size: 14px; padding: 10px 14px; }
      .nav-item { min-height: 50px; padding: 14px 16px; font-size: 15px; }
      .section-title { font-size: 17px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.94.0",
      "vite": "https://esm.sh/vite@^7.3.1",
      "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3",
      "recharts": "https://esm.sh/recharts@^3.7.0",
      "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
      "react/": "https://esm.sh/react@^19.2.4/",
      "react": "https://esm.sh/react@^19.2.4",
      "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
      "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
